<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FELIZ CUMPLE</title>
</head
  meta name = "viewport" content = "width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="estilos.css">
  <script  src ="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script> 
<body>

    <!-- Reproductor de musica de fondo -->
    <audio id="musica-fondo" src="https://mentedigital7.github.io/cumple/gone.mp3" loop></audio>
    <button id="boton-musica" onclick="controlarMusica()">🎵</button>

    <!-- Seccion de cuenta regresica-->
     <div id="seccion-reloj" class="contenedor-reloj">
        <h2>Falta muy poco..</h2>
        <div id="reloj" class="reloj-numeros">00d 00h 00m 00s</div>
        <p>Preparando algo especial para tu cumpleaños..</p>
     </div>

    <!-- CONTENIDO REAL --> 
    <div id="contenido-regalo" style="display: none;">

        <header>
        <h1>!!! FELIZ CUMPLEAÑOS¡¡¡ 🎉</h1>
        <p>Un pequelo detalle digital para ti.</p>
        </header>

        <main class="contenedor-cartas"> 
            
            <!-- Carta 1 -->
            <div class="carta" onclick="abrirCarta(this)">
                <h2>¡Muchísimas felicidades!</h2>
                <p class="contenido-carta" data-texto="¡Feliz, feliz cumpleaños! Espero que pases un día increíble. 
                    De verdad me dio muchísima pena no poder acompañarte en tu dia especial, 
                    me quedé con muchas ganas de celebrar contigo. Pero no quería dejar pasar 
                    tu día sin hacerte un detalle especial, así que decidí armarte esto con un 
                    poco de código para recordarte lo mucho que te aprecio. ¡Te mando un abrazote gigante!"></p>
            </div>

            <!-- Carta 2 -->
            <div class="carta" onclick="abrirCarta(this)">
                <h2>Modo Celebración</h2>
                <p class="contenido-carta" data-texto="Sé que hoy toca disfrutar al máximo, 
                    rodearte de tu familia, tus amigos y,
                    sobre todo, comer muchísimo pastel 
                    (que las calorías de cumpleañera no cuentan). 
                    Espero de corazón que este día esté 
                    lleno de puras risas y momentos bonitos, 
                    porque te lo mereces por completo" ></p>
            </div>
            
            
            <!-- Carta 3 -->
            <div class="carta" onclick="abrirCarta(this)">
                <h2>Lo que va de estos 2 meses</h2>
                <p class="contenido-carta" data-texto="Parece mentira que solo vayan un par de meses desde que empezamos a hablar.
                    En este tiempo ya descubrí que eres una persona increíble, súper divertida 
                    y con una vibra genial. Qué buena fortuna haber coincidido en ese bus"></p>
            </div>


            <!-- Carta 4 -->
            <div class="carta carta_premio" onclick ="abrirCarta(this)">
                <h2>Mi pase de compensación</h2>  
                <p class="contenido-carta" data-texto="Como falté a la fiesta, oficialmente te debo la celebración. 
                    Así que este mensaje es un vale por una salida a comer o por unos 
                    helados para ponernos al día y celebrar tus 18 como se debe. 
                    ¡Tú eliges el día!"></p> 
            </div>
        </main> 
    </div>
    <script src="script.js"></script>
</body>
</html>
